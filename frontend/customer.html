<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard – FarmConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--gd:#1B5E20;--gm:#2E7D32;--gl:#4CAF50;--white:#fff;--gray:#F3F4F6;--gray2:#E5E7EB;--dark:#1a1a1a;--muted:#6B7280;--sh:0 4px 24px rgba(0,0,0,.07);--shh:0 8px 40px rgba(27,94,32,.15);}
    *{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;color:var(--dark);background:#f9faf5;overflow-x:hidden;}h1,h2,h3{font-family:'Playfair Display',serif;}
    
    .container{max-width:1200px;margin:0 auto;padding:0 20px;}
    
    header{background:var(--gd);color:white;padding:20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:var(--shh);}
    .header-left{display:flex;align-items:center;gap:12px;}
    .logo{font-size:1.3rem;font-weight:700;text-decoration:none;color:white;}
    .header-right{display:flex;align-items:center;gap:14px;}
    .notif-bell{background:rgba(255,255,255,.2);border:none;border-radius:8px;width:36px;height:36px;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;color:white;transition:all .2s;position:relative;}
    .notif-bell:hover{background:rgba(255,255,255,.3);}
    .notif-badge{position:absolute;top:-4px;right:-4px;background:#ef4444;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:white;font-weight:700;}
    .notif-badge.hidden{display:none;}
    .user-menu a{color:white;text-decoration:none;padding:6px 12px;border-radius:6px;transition:all .2s;font-size:.85rem;font-weight:600;}
    .user-menu a:hover{background:rgba(255,255,255,.2);}
    
    .dash-grid{display:grid;grid-template-columns:240px 1fr;gap:20px;padding:20px 0;min-height:calc(100vh - 80px);}
    
    .sidebar{background:white;border-radius:14px;padding:18px;box-shadow:var(--sh);}
    .sidebar-title{font-size:.88rem;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:12px;letter-spacing:.05em;}
    .sidebar-item{display:block;padding:10px 12px;margin-bottom:6px;border-radius:8px;text-decoration:none;color:var(--dark);font-size:.87rem;font-weight:500;transition:all .2s;cursor:pointer;border:none;background:none;width:100%;text-align:left;}
    .sidebar-item:hover, .sidebar-item.active{background:#e8f5e9;color:var(--gd);}
    
    .content{background:white;border-radius:14px;padding:30px;box-shadow:var(--sh);}
    .content-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;padding-bottom:18px;border-bottom:2px solid var(--gray2);}
    .content-hd h2{font-size:1.6rem;}
    
    .section{display:none;margin-bottom:30px;}
    .section.active{display:block;}
    
    .orders-table{width:100%;border-collapse:collapse;margin-top:18px;}
    .orders-table th{background:var(--gray);padding:12px;text-align:left;font-weight:600;font-size:.85rem;border-bottom:2px solid var(--gray2);}
    .orders-table td{padding:12px;border-bottom:1px solid var(--gray2);font-size:.85rem;}
    .orders-table tr:hover{background:#f9faf5;}
    .status-badge{display:inline-block;padding:4px 9px;border-radius:6px;font-size:.73rem;font-weight:600;}
    .status-pending{background:#fef3c7;color:#d97706;}
    .status-processing{background:#dbeafe;color:#2563eb;}
    .status-completed{background:#d1fae5;color:#059669;}
    .status-cancelled{background:#fee2e2;color:#dc2626;}
    
    .sub-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin:20px 0;}
    .sub-card{background:white;border:1.5px solid var(--gray2);border-radius:14px;padding:24px;transition:all .2s;text-align:center;}
    .sub-card:hover{border-color:var(--gd);box-shadow:var(--sh);}
    .sub-price{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--gd);margin:12px 0;}
    .sub-desc{font-size:.85rem;color:var(--muted);margin:12px 0;list-style:none;text-align:left;}
    .sub-desc li{margin:8px 0;}
    .btn-subscribe{padding:12px 24px;background:var(--gd);color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:all .2s;width:100%;margin-top:16px;}
    .btn-subscribe:hover{background:var(--gm);}
    .btn-subscribe.current{background:var(--gm);pointer-events:none;}
    
    .discount-badge{background:#d1fae5;color:#059669;padding:8px 14px;border-radius:10px;font-weight:600;display:inline-block;margin:12px 0;}
    
    .notif-list{display:flex;flex-direction:column;gap:12px;max-height:350px;overflow-y:auto;}
    .notif-item{background:var(--gray);padding:12px 14px;border-radius:10px;border-left:4px solid var(--gd);font-size:.85rem;}
    .notif-msg{margin-bottom:4px;font-weight:500;}
    .notif-time{font-size:.75rem;color:var(--muted);}
    .notif-empty{padding:30px;text-align:center;color:var(--muted);font-size:.87rem;}
    
    @media(max-width:768px){.dash-grid{grid-template-columns:1fr}.sub-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html" class="logo">🌿 FarmConnect</a>
  </div>
  <div class="header-right">
    <button class="notif-bell" id="notifBell" onclick="toggleNotifications()">🔔<span class="notif-badge" id="notifBadge"></span></button>
    <div class="user-menu">
      <span id="userName">Customer</span> |
      <a href="#" onclick="doLogout();return false">Logout</a>
    </div>
  </div>
</header>

<div class="container dash-grid">
  <div class="sidebar">
    <div class="sidebar-title">Menu</div>
    <button class="sidebar-item active" onclick="showSection('orders')">📦 My Orders</button>
    <button class="sidebar-item" onclick="showSection('subscription')">💳 Subscription</button>
  </div>

  <div class="content">
    <!-- ORDERS SECTION -->
    <div id="orders" class="section active">
      <div class="content-hd"><h2>My Orders</h2></div>
      <div id="discountInfo"></div>
      <table class="orders-table">
        <thead>
          <tr><th>Order ID</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th></tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>

    <!-- SUBSCRIPTION SECTION -->
    <div id="subscription" class="section">
      <div class="content-hd"><h2>Premium Membership</h2></div>
      <p style="color:var(--muted);margin-bottom:24px;">Upgrade your FarmConnect experience with exclusive benefits and discounts on every order.</p>
      <div id="currentPlan"></div>
      <div class="sub-grid" id="subPlans"></div>
    </div>
  </div>
</div>

<!-- NOTIFICATIONS MODAL -->
<div id="notifPanel" style="position:fixed;right:-350px;top:68px;width:320px;max-height:calc(100vh-68px);background:white;box-shadow:var(--shh);transition:right .3s;z-index:999;border-radius:0 0 0 12px;overflow-y:auto;">
  <div style="padding:16px;border-bottom:1px solid var(--gray2);display:flex;justify-content:space-between;align-items:center;">
    <strong>Notifications</strong>
    <button onclick="toggleNotifications()" style="border:none;background:none;cursor:pointer;font-size:1.2rem;">✕</button>
  </div>
  <div id="notifList" class="notif-list" style="padding:12px;"></div>
</div>

<script src="assets/api.js"></script>
<script>
var currentUser = null;
var currentPlan = null;

window.addEventListener('DOMContentLoaded', async function () {
    var user = await checkSession('customer');
    if (!user) return;

    currentUser = user;
    document.getElementById('userName').textContent = user.name;
    loadOrders();
    loadSubscriptionPlans();
    loadNotifications();
    setInterval(loadNotifications, 30000);
});

function showSection(sectionId) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
    event.target.classList.add('active');
}

async function loadOrders() {
    var res = await API.getOrders();
    
    // Show discount info if applicable
    var planRes = await API.getPlan();
    if (planRes.success && planRes.has_subscription && planRes.discount_pct > 0) {
        document.getElementById('discountInfo').innerHTML = 
            '<div class="discount-badge">✓ Premium Member: ' + planRes.discount_pct + '% discount applied on all orders</div>';
    }

    if (!res.success || !res.orders || !res.orders.length) {
        document.getElementById('ordersBody').innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);">No orders yet. <a href="index.html" style="color:var(--gd);text-decoration:none;font-weight:600;">Start shopping →</a></td></tr>';
        return;
    }

    document.getElementById('ordersBody').innerHTML = res.orders.map(o =>
        '<tr><td>#' + o.id + '</td><td>' + (o.items_summary || 'N/A') + '</td>' +
        '<td>₹' + parseFloat(o.total_amount).toFixed(2) + '</td>' +
        '<td><span class="status-badge status-' + o.status + '">' + o.status + '</span></td>' +
        '<td>' + formatDate(o.created_at) + '</td></tr>'
    ).join('');
}

async function loadSubscriptionPlans() {
    var planRes = await API.getPlan();
    var html = '';

    if (planRes.success && planRes.has_subscription) {
        currentPlan = planRes.plan;
        html = '<div style="background:#e8f5e9;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<strong>Current Plan: ' + planRes.plan.toUpperCase() + '</strong><br>' +
            '<span style="color:var(--muted);font-size:.85rem;">Discount: ' + planRes.discount_pct + '%<br>' +
            'Active until: ' + formatDate(planRes.end_date) + '</span>' +
            '</div>';
    }

    document.getElementById('currentPlan').innerHTML = html;

    var plans = [
        { id: 'monthly', name: 'Monthly', price: '₹599', discount: '10%', desc: 'Billed monthly' },
        { id: 'quarterly', name: 'Quarterly', price: '₹1,499', discount: '20%', desc: 'Best Value | ₹499/mo' },
        { id: 'yearly', name: 'Yearly', price: '₹4,999', discount: '30%', desc: 'Billed annually | ₹416/mo' }
    ];

    document.getElementById('subPlans').innerHTML = plans.map(plan =>
        '<div class="sub-card">' +
        '<h3 style="font-size:1.1rem;margin-bottom:8px">' + plan.name + '</h3>' +
        '<div class="sub-price">' + plan.price + '</div>' +
        '<small style="color:var(--muted)">' + plan.desc + '</small>' +
        '<ul class="sub-desc"><li>✓ ' + plan.discount + ' discount on all orders</li>' +
        '<li>✓ Free delivery on orders ₹300+</li><li>✓ Priority access to new produce</li></ul>' +
        '<button class="btn-subscribe' + (currentPlan === plan.id ? ' current' : '') + '" onclick="subscribeToPlan(\'' + plan.id + '\')">' +
        (currentPlan === plan.id ? '✓ Current Plan' : 'Subscribe') + '</button>' +
        '</div>'
    ).join('');
}

async function subscribeToPlan(planId) {
    if (currentPlan === planId) {
        showToast('You are already on this plan.', 'info');
        return;
    }

    if (!confirm('Upgrade to ' + planId + ' plan?')) return;

    var res = await API.subscribe(planId);
    if (res.success) {
        showToast('✓ Subscription activated! ' + res.discount_pct + '% discount applied.', 'success');
        loadSubscriptionPlans();
        loadOrders();
    } else {
        showToast(res.message, 'error');
    }
}

async function loadNotifications() {
    var res = await API.getNotifications();
    if (res.success && res.unread_count) {
        document.getElementById('notifBadge').textContent = res.unread_count;
        document.getElementById('notifBadge').classList.remove('hidden');
    } else {
        document.getElementById('notifBadge').classList.add('hidden');
    }

    if (res.success && res.notifications && res.notifications.length) {
        document.getElementById('notifList').innerHTML = res.notifications.map(n =>
            '<div class="notif-item"><div class="notif-msg">' + n.message + '</div><div class="notif-time">' + formatDate(n.created_at) + '</div></div>'
        ).join('');
    } else {
        document.getElementById('notifList').innerHTML = '<div class="notif-empty">No new notifications</div>';
    }
}

function toggleNotifications() {
    var panel = document.getElementById('notifPanel');
    if (panel.style.right === '0px') {
        panel.style.right = '-350px';
    } else {
        panel.style.right = '0';
        if (document.getElementById('notifList').children.length > 0) {
            API.markAllNotificationsRead();
            loadNotifications();
        }
    }
}

async function doLogout() {
    await API.logout();
    window.location.href = 'index.html';
}
</script>

</body>
</html>
