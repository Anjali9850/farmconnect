<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmer Profile – FarmConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--gd:#1B5E20;--gm:#2E7D32;--gl:#4CAF50;--white:#fff;--gray:#F3F4F6;--gray2:#E5E7EB;--dark:#1a1a1a;--muted:#6B7280;--sh:0 4px 24px rgba(0,0,0,.07);--shh:0 8px 40px rgba(27,94,32,.15);}
    *{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;color:var(--dark);background:var(--white);overflow-x:hidden;}
    h1,h2,h3,h4{font-family:'Playfair Display',serif;}
    
    .container{max-width:1200px;margin:0 auto;padding:0 20px;}
    
    nav{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--gray2);padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:68px;}
    .logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--gd);text-decoration:none;display:flex;align-items:center;gap:10px;}
    .logo-box{width:32px;height:32px;background:var(--gd);border-radius:8px;display:flex;align-items:center;justify-content:center;}
    .logo-box svg{width:18px;height:18px;fill:white;}
    .nav-links{display:flex;gap:2px;}
    .nav-links a{padding:6px 12px;border-radius:6px;font-size:.85rem;font-weight:500;color:var(--dark);text-decoration:none;transition:all .2s;}
    .nav-links a:hover{background:var(--gray);color:var(--gd);}
    .btn-back{padding:8px 16px;background:var(--gray);border:none;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--gd);}
    .btn-back:hover{background:var(--gray2);}
    
    .header-cover{height:280px;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);position:relative;margin-bottom:-60px;z-index:1;}
    
    .profile-top{padding:60px 0 40px;position:relative;z-index:2;}
    .profile-card{background:white;border-radius:20px;padding:36px;box-shadow:var(--shh);display:grid;grid-template-columns:1fr 2fr;gap:40px;align-items:start;}
    .profile-img{width:180px;height:180px;border-radius:16px;background:var(--gray);overflow:hidden;border:4px solid var(--gd);}
    .profile-img img{width:100%;height:100%;object-fit:cover;}
    
    .profile-info h1{font-size:2rem;margin-bottom:6px;}
    .profile-meta{display:flex;gap:20px;margin:16px 0 24px;flex-wrap:wrap;}
    .meta-item{display:flex;align-items:center;gap:6px;font-size:.9rem;color:var(--muted);}
    .meta-item strong{color:var(--gd);}
    .rating{display:flex;align-items:center;gap:4px;font-weight:600;}
    .rating svg{width:16px;height:16px;fill:#fbbf24;}
    .profile-desc{font-size:.95rem;line-height:1.7;color:var(--muted);margin-bottom:16px;}
    .cert-badges{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px;}
    .cert-badge{background:#e8f5e9;color:var(--gd);padding:6px 12px;border-radius:8px;font-size:.77rem;font-weight:600;}
    
    .tabs{display:flex;gap:2px;border-bottom:2px solid var(--gray2);margin:40px 0 30px;}
    .tab{padding:12px 18px;border:none;background:none;font-size:.9rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;color:var(--dark);}
    .tab.active{color:var(--gd);border-bottom-color:var(--gd);}
    .tab:hover{color:var(--gd);}
    
    .tab-content{display:none;}
    .tab-content.active{display:block;}
    
    .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:40px;}
    .gallery-img{border-radius:14px;overflow:hidden;height:220px;background:var(--gray);box-shadow:var(--sh);transition:transform .3s;}
    .gallery-img img{width:100%;height:100%;object-fit:cover;}
    .gallery-img:hover{transform:scale(1.03);}
    
    .certs-list{display:flex;flex-direction:column;gap:14px;}
    .cert-item{background:white;border:1.5px solid var(--gray2);border-radius:14px;padding:20px;display:flex;align-items:center;gap:16px;}
    .cert-icon{width:50px;height:50px;background:#e8f5e9;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .cert-icon svg{width:26px;height:26px;stroke:var(--gd);fill:none;stroke-width:2;}
    .cert-text h3{font-size:.95rem;font-weight:600;margin-bottom:2px;}
    .cert-text p{font-size:.81rem;color:var(--muted);}
    .cert-badge-verified{background:#d1fae5;color:#059669;padding:3px 9px;border-radius:6px;font-size:.70rem;font-weight:700;}
    
    .practices-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;}
    .practice-card{background:white;border:1.5px solid var(--gray2);border-radius:14px;padding:22px;transition:all .2s;}
    .practice-card:hover{border-color:var(--gd);box-shadow:var(--sh);}
    .practice-title{font-size:.95rem;font-weight:600;margin-bottom:8px;color:var(--gd);}
    .practice-detail{font-size:.81rem;color:var(--muted);line-height:1.6;}
    
    .products{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;}
    .pcard{background:white;border-radius:14px;border:1.5px solid var(--gray2);overflow:hidden;transition:all .2s;}
    .pcard:hover{border-color:var(--gd);box-shadow:var(--sh);}
    .pcard-img{height:160px;background:var(--gray);overflow:hidden;}
    .pcard-img img{width:100%;height:100%;object-fit:cover;}
    .pcard-info{padding:14px;}
    .pcard-name{font-size:.9rem;font-weight:600;margin-bottom:6px;}
    .pcard-price{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--gd);}
    .pcard-unit{font-size:.75rem;color:var(--muted);}
    
    footer{background:#0d2d10;color:rgba(255,255,255,.72);padding:40px 5%;margin-top:60px;text-align:center;font-size:.85rem;}
    
    .loading{text-align:center;padding:60px 20px;color:var(--muted);}
    .spinner{width:30px;height:30px;border:3px solid var(--gray2);border-top-color:var(--gd);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    @media(max-width:768px){.profile-card{grid-template-columns:1fr;}.tabs{flex-wrap:wrap}.gallery{grid-template-columns:repeat(2,1fr)}.products{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><div class="logo-box"><svg viewBox="0 0 24 24"><path d="M12 2C8 2 4 6 4 10c0 5 8 12 8 12s8-7 8-12c0-4-4-8-8-8z"/></svg></div>FarmConnect</a>
  <div class="nav-links">
    <a href="index.html">Back to Home</a>
  </div>
</nav>

<div class="header-cover"></div>

<div class="container">
  <div class="profile-top">
    <div id="profileLoading" class="loading"><div class="spinner"></div>Loading farmer profile…</div>
    <div id="profileContent" style="display:none">
      <div class="profile-card">
        <div>
          <div class="profile-img"><img id="profileImg" src="" alt="Farmer" onerror="this.style.display='none'"></div>
        </div>
        <div>
          <h1 id="farmerName"></h1>
          <div class="profile-meta">
            <div class="meta-item">📍 <span id="farmLocation"></span></div>
            <div class="meta-item">🌾 Since <span id="establishedYear"></span></div>
            <div class="rating"><span id="farmRating">4.8</span><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 10.26 23.77 10.26 17.85 16.38 20.92 24.74 12 18.62 3.07 24.74 6.14 16.38 0.22 10.26 8.9 10.26 12 2"/></svg></div>
          </div>
          <p class="profile-desc" id="farmerBio"></p>
          <div class="cert-badges" id="certBadges"></div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('gallery',this)">🖼️ Photo Gallery</button>
        <button class="tab" onclick="switchTab('practices',this)">🌱 Farm Practices</button>
        <button class="tab" onclick="switchTab('products',this)">🥬 Products</button>
        <button class="tab" onclick="switchTab('certs',this)">✓ Certifications</button>
      </div>

      <div id="gallery" class="tab-content active">
        <div class="gallery" id="galleryGrid"></div>
      </div>

      <div id="practices" class="tab-content">
        <div class="practices-grid" id="practicesGrid"></div>
      </div>

      <div id="products" class="tab-content">
        <div class="products" id="productsGrid"></div>
      </div>

      <div id="certs" class="tab-content">
        <div class="certs-list" id="certsList"></div>
      </div>
    </div>
  </div>
</div>

<footer>
  <p>&copy; 2025 FarmConnect. Connecting Farmers & Families.</p>
</footer>

<script src="assets/api.js"></script>
<script>
var farmerId = new URLSearchParams(window.location.search).get('id');

window.addEventListener('DOMContentLoaded', function () {
    if (!farmerId) {
        document.getElementById('profileLoading').innerHTML = '<p style="color:#c62828">Farmer ID not found.</p>';
        return;
    }
    loadFarmerProfile();
});

async function loadFarmerProfile() {
    var res = await API.getFarmerProfile(farmerId);
    if (!res.success) {
        document.getElementById('profileLoading').innerHTML = '<p style="color:#c62828">' + (res.message || 'Farmer not found') + '</p>';
        return;
    }

    var farmer = res.data.profile;
    var gallery = res.data.gallery || [];
    var practices = res.data.practices || [];
    var products = res.data.products || [];
    var certs = res.data.certifications || [];

    // Profile
    document.getElementById('farmerName').textContent = farmer.name;
    document.getElementById('farmLocation').textContent = farmer.location || 'N/A';
    document.getElementById('establishedYear').textContent = farmer.established_year || '2020';
    document.getElementById('farmerBio').textContent = farmer.bio || 'Dedicated farmer committed to sustainable practices.';
    
    if (farmer.profile_photo) {
        document.getElementById('profileImg').src = farmer.profile_photo;
    }

    // Certifications badges
    var certBadgesHtml = '';
    if (certs && certs.length) {
        certs.forEach(function (c) {
            if (c.is_verified) certBadgesHtml += '<span class="cert-badge">✓ ' + c.name + '</span>';
        });
    }
    document.getElementById('certBadges').innerHTML = certBadgesHtml || '<span class="cert-badge">✓ Organic Verified</span>';

    // Gallery
    var galleryHtml = gallery.map(function (img) {
        return '<div class="gallery-img"><img src="' + img.image_url + '" alt="Farm photo" onerror="this.style.display=\'none\'"></div>';
    }).join('');
    document.getElementById('galleryGrid').innerHTML = galleryHtml || '<p style="color:var(--muted)">No farm photos yet.</p>';

    // Practices
    var practicesHtml = practices.map(function (p) {
        var details = 'Fertilizer: ' + (p.fertilizer_used || 'N/A') + ' | Irrigation: ' + (p.irrigation_method || 'N/A');
        return '<div class="practice-card"><div class="practice-title">' + p.product_name + '</div><div class="practice-detail">' + details + '</div></div>';
    }).join('');
    document.getElementById('practicesGrid').innerHTML = practicesHtml || '<p style="color:var(--muted)">No farm practices logged yet.</p>';

    // Products
    var productsHtml = products.map(function (p) {
        var img = p.image_url ? '<img src="' + p.image_url + '" alt="' + p.name + '" onerror="this.style.display=\'none\'">' : '';
        return '<div class="pcard"><div class="pcard-img">' + img + '</div><div class="pcard-info"><div class="pcard-name">' + p.name + '</div><div class="pcard-price">₹' + parseFloat(p.price).toFixed(0) + '<span class="pcard-unit"> / ' + p.unit + '</span></div></div></div>';
    }).join('');
    document.getElementById('productsGrid').innerHTML = productsHtml || '<p style="color:var(--muted)">No products listed.</p>';

    // Certifications
    var certsHtml = certs.map(function (c) {
        return '<div class="cert-item"><div class="cert-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="cert-text"><h3>' + c.name + '</h3><p>' + (c.issued_by || 'Verified by FarmConnect') + '</p></div><span class="cert-badge-verified">✓ VERIFIED</span></div>';
    }).join('');
    document.getElementById('certsList').innerHTML = certsHtml || '<p style="color:var(--muted)">No certifications yet.</p>';

    document.getElementById('profileLoading').style.display = 'none';
    document.getElementById('profileContent').style.display = 'block';
}

function switchTab(tab, btn) {
    document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function (t) { t.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById(tab).classList.add('active');
}
</script>

</body>
</html>
